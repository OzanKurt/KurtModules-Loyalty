name: assets

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        name: Node - build + test

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Install
              run: npm ci

            - name: Test
              run: npm run test

            - name: Build
              run: npm run build
